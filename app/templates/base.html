<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}EduEvents{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Cabinet+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('pages.home') }}">Edu<span>Events</span></a>
    <nav class="nav">
      {% if request.endpoint == "pages.register" %}
        <a class="primary" href="{{ url_for('pages.register') }}">Register</a>
      {% elif request.endpoint == "pages.database_page" %}
        <a class="primary" href="{{ url_for('pages.database_page') }}">Database</a>
      {% elif request.endpoint == "pages.about" %}
        <a class="primary" href="{{ url_for('pages.about') }}">About</a>
      {% elif request.endpoint == "pages.login_page" %}
        <a class="primary" href="{{ url_for('pages.login_page') }}">Login</a>
      {% else %}
        <a class="primary" href="{{ url_for('pages.home') }}">Home</a>
      {% endif %}
    </nav>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
